name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm run check
      - run: npm test
      - run: python -m unittest discover -s tests -p "test_*.py" -v
